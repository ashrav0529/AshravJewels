<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Securely complete your luxury jewelry purchase at Ashrav Jewels.">
  <title>Checkout | Ashrav Jewels</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Dynamic Glassmorphic Navigation Header -->
  <div id="header-placeholder"></div>

  <main>
    <div class="section" style="padding-top: 3rem;" id="checkout-root-container">
      <div class="section-header" style="margin-bottom: 2.5rem;">
        <span class="section-subtitle">Secure Payment</span>
        <h1 class="section-title">Checkout Atelier</h1>
      </div>

      <!-- Checkout Form Layout -->
      <div class="checkout-layout">
        <!-- Billing / Shipping and Payment Form -->
        <div class="checkout-form-container">
          <form id="checkout-form" novalidate>
            <!-- Step 1: Shipping Address -->
            <div style="margin-bottom: 3rem;">
              <h2 class="checkout-step-title"><i class="fas fa-shipping-fast" style="margin-right: 10px;"></i> 1. Shipping Address</h2>
              
              <div class="form-group">
                <label for="ship-name" class="form-label">Full Name</label>
                <input type="text" id="ship-name" class="form-control" placeholder="Ashritha Purnima" required>
              </div>

              <div class="form-group">
                <label for="ship-address" class="form-label">Street Address</label>
                <input type="text" id="ship-address" class="form-control" placeholder="100 Luxury Avenue, Suite 500" required>
              </div>

              <div class="form-grid-2">
                <div class="form-group">
                  <label for="ship-city" class="form-label">City</label>
                  <input type="text" id="ship-city" class="form-control" placeholder="Bangkok" required>
                </div>
                <div class="form-group">
                  <label for="ship-zip" class="form-label">Postal / ZIP Code</label>
                  <input type="text" id="ship-zip" class="form-control" placeholder="10110" required>
                </div>
              </div>

              <div class="form-grid-2">
                <div class="form-group">
                  <label for="ship-country" class="form-label">Country</label>
                  <input type="text" id="ship-country" class="form-control" placeholder="Thailand" required>
                </div>
                <div class="form-group">
                  <label for="ship-phone" class="form-label">Phone Number</label>
                  <input type="tel" id="ship-phone" class="form-control" placeholder="+66 81 234 5678" required>
                </div>
              </div>
            </div>

            <!-- Step 2: Payment Details (Simulation) -->
            <div>
              <h2 class="checkout-step-title"><i class="fas fa-credit-card" style="margin-right: 10px;"></i> 2. Payment Method</h2>
              <p style="font-size: 0.75rem; color: var(--text-gray); margin-bottom: 1.5rem;">
                This is a secure checkout simulation. You can use any mock card details to test the transaction.
              </p>

              <div class="form-group">
                <label for="card-name" class="form-label">Name on Card</label>
                <input type="text" id="card-name" class="form-control" placeholder="ASHRITHA PURNIMA" required>
              </div>

              <div class="form-group">
                <label for="card-number" class="form-label">Card Number</label>
                <div class="password-input-container">
                  <input type="text" id="card-number" class="form-control" placeholder="4111 2222 3333 4444" maxlength="19" required>
                  <span style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"><i class="fab fa-cc-visa"></i></span>
                </div>
              </div>

              <div class="form-grid-2">
                <div class="form-group">
                  <label for="card-expiry" class="form-label">Expiry Date</label>
                  <input type="text" id="card-expiry" class="form-control" placeholder="MM/YY" maxlength="5" required>
                </div>
                <div class="form-group">
                  <label for="card-cvv" class="form-label">CVV / CVC</label>
                  <input type="password" id="card-cvv" class="form-control" placeholder="•••" maxlength="4" required>
                </div>
              </div>
            </div>

            <!-- Submit Order Button -->
            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 3rem; padding: 1.1rem 2rem;">
              Place Order & Pay
            </button>
          </form>
        </div>

        <!-- Order Review Panel -->
        <div class="order-review-card">
          <h2 class="summary-title">Review Your Selection</h2>
          
          <!-- Product item summary list -->
          <div class="order-review-items" id="review-items">
            <!-- Dynamically populated via JS -->
          </div>

          <div style="margin-top: 1.5rem;">
            <div class="summary-row">
              <span>Subtotal</span>
              <span id="summary-subtotal">$0</span>
            </div>
            <div class="summary-row">
              <span>Insured Shipping</span>
              <span id="summary-shipping">$0</span>
            </div>
            <div class="summary-row total" style="margin-top: 1rem; padding-top: 1rem;">
              <span>Total Amount</span>
              <span id="summary-total">$0</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Dynamic Luxury Footer -->
  <div id="footer-placeholder"></div>

  <!-- Global scripts -->
  <script src="js/main.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
