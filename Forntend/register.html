<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create an account with Ashrav Jewels to access customized designs, order tracking, and complimentary artisan services.">
  <title>Create Account | Ashrav Jewels</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Dynamic Glassmorphic Navigation Header -->
  <div id="header-placeholder"></div>

  <main>
    <div class="auth-container">
      <div class="auth-card">
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Register to begin your luxury journey</p>
        
        <!-- Action Alert Notification Box -->
        <div id="alert-container"></div>

        <form id="register-form" novalidate>
          <div class="form-group">
            <label for="username" class="form-label">Full Name / Username</label>
            <input type="text" id="username" class="form-control" placeholder="Ashritha Purnima" required>
          </div>

          <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="concierge@ashravjewels.com" required>
          </div>
          
          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <div class="password-input-container">
              <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" required>
              <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="confirm-password" class="form-label">Confirm Password</label>
            <div class="password-input-container">
              <input type="password" id="confirm-password" class="form-control" placeholder="Repeat your password" required>
              <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block" style="margin-top: 2rem;">Create Account</button>
        </form>

        <div class="auth-footer">
          <p>Already have an account? <a href="login.html">Sign In</a></p>
        </div>
      </div>
    </div>
  </main>

  <!-- Dynamic Luxury Footer -->
  <div id="footer-placeholder"></div>

  <!-- Global scripts -->
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
