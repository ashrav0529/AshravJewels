<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View your order history, manage shipping details, and customize your Ashrav Jewels account settings.">
  <title>Customer Dashboard | Ashrav Jewels</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Dynamic Glassmorphic Navigation Header -->
  <div id="header-placeholder"></div>

  <main>
    <!-- Profile Page Layout -->
    <div class="profile-layout">
      <!-- Profile Sidebar Card -->
      <aside class="profile-sidebar">
        <div class="profile-avatar-placeholder" id="profile-avatar-char">
          A
        </div>
        <h2 class="profile-username" id="profile-username">Customer Name</h2>
        <p class="profile-email" id="profile-email">customer@ashravjewels.com</p>
        
        <div class="profile-meta-info">
          <div>
            <span>Account Tier:</span>
            <span style="color: var(--gold-primary); font-weight: 600;">Elite Member</span>
          </div>
          <div>
            <span>Member Since:</span>
            <span id="profile-reg-date">June 2026</span>
          </div>
          <div>
            <span>Order Statuses:</span>
            <span>All Active</span>
          </div>
        </div>

        <button onclick="logout()" class="btn btn-secondary btn-block" style="margin-top: 2rem; padding: 0.6rem 1.2rem; font-size: 0.75rem; border-color: rgba(220,53,69,0.3); color: #ff6b6b;">
          <i class="fas fa-sign-out-alt" style="margin-right: 8px;"></i> Sign Out
        </button>
      </aside>

      <!-- Main Profile Dashboard Content -->
      <section class="profile-main">
        <h1 class="profile-section-title">
          <span><i class="fas fa-history" style="margin-right: 10px; color: var(--gold-primary);"></i> Order History</span>
          <span style="font-size: 0.75rem; font-family: var(--font-sans); text-transform: uppercase; letter-spacing: 1px; color: var(--text-gray); font-weight: 400;">Bespoke Timeline</span>
        </h1>

        <!-- Chronological Order Timeline (Loaded dynamically) -->
        <div class="orders-timeline" id="orders-timeline">
          <!-- Loading spinner -->
          <div style="text-align: center; padding: 4rem 0;">
            <i class="fas fa-spinner fa-spin" style="font-size: 1.5rem; color: var(--gold-primary);"></i>
            <p style="margin-top: 1rem; color: var(--text-gray); font-size: 0.85rem;">Retrieving order database...</p>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- Dynamic Luxury Footer -->
  <div id="footer-placeholder"></div>

  <!-- Global scripts -->
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
