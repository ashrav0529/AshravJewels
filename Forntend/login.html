<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Log in to your Ashrav Jewels account to manage your bespoke orders and view your purchase history.">
  <title>Sign In | Ashrav Jewels</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="header-placeholder"></div>

  <main>
    <div class="auth-container">
      <div class="auth-card">
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to manage your collection and orders</p>

        <div id="alert-container"></div>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="concierge@ashravjewels.com" required>
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <div class="password-input-container">
              <input type="password" id="password" class="form-control" placeholder="••••••••" required>
              <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block" style="margin-top: 2rem;">Sign In</button>
        </form>

        <div class="auth-footer">
          <p>New to Ashrav Jewels? <a href="register.html">Create an Account</a></p>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
